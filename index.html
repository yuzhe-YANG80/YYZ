<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>冰蓝碳迹 · 总量二维码</title>
  <!-- Google Fonts & Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- QRCode.js -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(145deg, #d4eaff 0%, #b3d9ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      color: #0b2b4a;
    }

    /* 清凉极光浮动光晕 */
    body::before {
      content: '';
      position: fixed;
      top: -15%;
      left: -5%;
      width: 85%;
      height: 85%;
      background: radial-gradient(circle at 20% 30%, rgba(0, 180, 255, 0.25) 0%, rgba(100, 210, 255, 0.05) 60%, transparent 80%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(35px);
      animation: floatGlow 14s infinite alternate ease-in-out;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -5%;
      width: 75%;
      height: 75%;
      background: radial-gradient(circle at 80% 80%, rgba(70, 150, 255, 0.25) 0%, rgba(0, 200, 255, 0.08) 50%, transparent 80%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(40px);
      animation: floatGlow 16s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      100% { transform: translate(-3%, 2%) scale(1.05); opacity: 0.85; }
    }

    /* 主卡片 — 冰蓝玻璃质感 */
    .dict-card {
      position: relative;
      z-index: 10;
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-radius: 3rem;
      box-shadow: 0 30px 50px -20px rgba(0, 70, 150, 0.3),
                  0 4px 12px rgba(0, 20, 60, 0.08),
                  inset 0 1px 2px rgba(255, 255, 255, 0.6);
      padding: 2rem 2rem 2.2rem;
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1), box-shadow 0.4s ease;
      border: 1px solid rgba(140, 210, 255, 0.4);
    }

    .dict-card:hover {
      box-shadow: 0 40px 60px -22px #0077be60, 0 8px 20px -6px #1e3a8a30, inset 0 0 0 1px rgba(255,255,255,0.5);
      transform: translateY(-6px);
    }

    /* 返回按钮 — 冰晶小标 */
    .back-home {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 20;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 2.5rem;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #075a8b;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(70, 170, 255, 0.4);
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,70,140,0.1);
      letter-spacing: 0.2px;
    }

    .back-home i {
      font-size: 0.8rem;
      color: #0a5f9e;
    }

    .back-home:hover {
      background: white;
      border-color: #3b9eff;
      transform: translateX(-3px);
      box-shadow: 0 6px 14px rgba(0,110,200,0.15);
      color: #02457a;
    }

    /* 图标区 — 深海冷蓝渐变 */
    .icon-wrapper {
      background: linear-gradient(145deg, #0a4c7e, #1e6ab3);
      width: 86px;
      height: 86px;
      margin: 0 auto 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2.2rem;
      box-shadow: 0 18px 24px -12px #0a3a60, 0 2px 6px rgba(0,0,0,0.05), inset 0 2px 4px rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .icon-wrapper i {
      font-size: 3.5rem;
      color: #e1f3ff;
      filter: drop-shadow(0 4px 6px #002b4e40);
      text-shadow: 0 2px 8px rgba(0,120,255,0.6);
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #035c8f, #1e88e5, #26c6da);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.4px;
      margin-bottom: 0.4rem;
      text-shadow: 0 2px 10px rgba(0,160,255,0.2);
    }

    .sub {
      color: #1a4e7a;
      font-weight: 500;
      font-size: 0.95rem;
      background: rgba(70, 160, 255, 0.12);
      display: inline-block;
      padding: 0.35rem 1.4rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      margin-bottom: 1.8rem;
      border: 0.5px solid rgba(100, 190, 255, 0.3);
      box-shadow: inset 0 1px 4px white;
    }

    .sub i {
      color: #0284c7;
      margin-right: 4px;
    }

    /* 表单区域 */
    .form-section {
      margin: 1.2rem 0 0.8rem;
    }

    .fields-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .fields-header label {
      font-weight: 600;
      color: #075a8b;
      background: rgba(0, 140, 255, 0.1);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      border: 0.5px solid rgba(70, 160, 255, 0.25);
    }

    .btn-add {
      background: rgba(30, 130, 230, 0.12);
      border: 1px solid rgba(30, 130, 230, 0.4);
      color: #065282;
      padding: 0.5rem 1.2rem;
      border-radius: 2.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 6px rgba(0,80,140,0.05);
    }

    .btn-add i {
      font-size: 0.9rem;
    }

    .btn-add:hover {
      background: #1a73c4;
      color: white;
      border-color: #1a73c4;
      transform: scale(0.97);
      box-shadow: 0 8px 14px -8px #0a4c7e;
    }

    .fields-container {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 0.2rem;
      margin-bottom: 1.2rem;
    }

    .field-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 0.75rem 1.1rem;
      border-radius: 1.8rem;
      border: 1px solid rgba(80, 170, 255, 0.3);
      transition: all 0.2s;
      box-shadow: inset 0 1px 3px rgba(255,255,255,0.5);
    }

    .field-row:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #3b9eff;
    }

    .field-key {
      flex: 1.2;
      min-width: 100px;
    }

    .field-value {
      flex: 2;
      min-width: 140px;
    }

    .field-row input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(20, 120, 200, 0.3);
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s;
      outline: none;
      color: #0a2e4a;
    }

    .field-row input:focus {
      border-color: #1e88e5;
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.2);
    }

    .btn-delete {
      background: rgba(180, 50, 80, 0.1);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 40px;
      color: #b13e5c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 1.1rem;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
    }

    .btn-delete:hover {
      background: #d65b7a;
      color: white;
      transform: scale(0.92);
    }

    /* 操作按钮组 */
    .action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
      margin: 1.8rem 0 1rem;
    }

    .btn {
      flex: 1;
      min-width: 150px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0.95rem 1.8rem;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #075a8b;
      box-shadow: 0 6px 14px rgba(0, 60, 120, 0.08), inset 0 1px 0 #ffffffcc;
      letter-spacing: 0.2px;
      text-decoration: none;
      border: 1px solid rgba(70, 170, 255, 0.3);
    }

    .btn-primary {
      background: linear-gradient(115deg, #0a5f9e, #1a73c4);
      color: white;
      box-shadow: 0 14px 22px -10px #0a4c7e, 0 1px 0 inset #7ac4ff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(115deg, #0e6bb3, #1f85d5);
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 22px 28px -16px #005a9c, 0 0 0 2px rgba(0, 180, 255, 0.2);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(40, 140, 255, 0.45);
      color: #065282;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.95);
      border-color: #3b9eff;
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 18px 24px -14px #1a6ab0, 0 0 0 3px rgba(0, 150, 255, 0.1);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* 二维码区域 */
    .qrcode-area {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1.5px dashed rgba(0, 130, 200, 0.3);
    }

    .qrcode-canvas-wrapper {
      display: flex;
      justify-content: center;
      margin: 1.2rem 0 1rem;
    }

    canvas {
      background: white;
      padding: 12px;
      border-radius: 28px;
      box-shadow: 0 16px 28px -12px rgba(0, 80, 150, 0.3), inset 0 0 0 1px rgba(255,255,255,0.8);
      max-width: 100%;
      height: auto;
      width: 200px;
      height: 200px;
    }

    .sum-preview {
      background: rgba(0, 140, 255, 0.08);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 0.75rem 1.5rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 500;
      color: #02457a;
      display: inline-block;
      margin-top: 0.5rem;
      border: 0.5px solid rgba(70, 170, 255, 0.25);
      box-shadow: inset 0 1px 4px white;
    }

    .sum-preview i {
      margin-right: 8px;
      color: #1e88e5;
    }

    /* 滚动条冰蓝风格 */
    .fields-container::-webkit-scrollbar {
      width: 5px;
    }

    .fields-container::-webkit-scrollbar-track {
      background: rgba(0, 120, 210, 0.08);
      border-radius: 10px;
    }

    .fields-container::-webkit-scrollbar-thumb {
      background: #1e88e5;
      border-radius: 10px;
    }

    /* 装饰小雪花（新奇） */
    .snowflake-deco {
      position: absolute;
      color: rgba(255, 255, 255, 0.2);
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    /* 响应式 */
    @media (max-width: 560px) {
      .dict-card {
        padding: 1.8rem 1.2rem 2rem;
        border-radius: 2.2rem;
      }
      .field-row {
        flex-direction: column;
        align-items: stretch;
      }
      .btn-delete {
        align-self: flex-end;
        width: 36px;
        height: 36px;
      }
      .action-group .btn {
        min-width: 130px;
        padding: 0.8rem 1.2rem;
      }
      .icon-wrapper {
        width: 70px;
        height: 70px;
      }
      .icon-wrapper i {
        font-size: 2.8rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      .back-home {
        top: 0.6rem;
        left: 0.6rem;
        padding: 0.3rem 0.8rem;
      }
    }

    @media (max-width: 400px) {
      .btn {
        min-width: 120px;
      }
    }

    .btn:focus-visible {
      outline: 3px solid #3b9eff;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <!-- 纯装饰冰晶 -->
  <div class="snowflake-deco" style="top: 10%; left: 6%; font-size: 2rem; opacity: 0.25;">❄️</div>
  <div class="snowflake-deco" style="bottom: 12%; right: 8%; font-size: 2.4rem; opacity: 0.2;">❄️</div>

  <div class="dict-card">
    <!-- 左上角返回按钮（链接不变） -->
    <a href="https://yuzhe-yang80.github.io/333/" class="back-home" target="_self">
      <i class="fas fa-arrow-left"></i> 返回
    </a>

    <div class="icon-wrapper">
      <i class="fas fa-cloud-sun"></i>
    </div>
    <h1>碳足迹 · 总量二维码</h1>
    <div class="sub">
      <i class="fas fa-chart-line"></i> 字典数值总和 → 总量:A kg CO₂e
    </div>

    <div class="form-section">
      <div class="fields-header">
        <label><i class="fas fa-layer-group"></i> 碳排放项 (值必须为数字，单位kg CO₂e)</label>
        <button type="button" class="btn-add" id="addFieldBtn">
          <i class="fas fa-plus-circle"></i> 添加字段
        </button>
      </div>
      <div class="fields-container" id="fieldsContainer">
        <!-- 动态行会由JS插入 -->
      </div>
    </div>

    <div class="action-group">
      <button class="btn btn-primary" id="generateQRBtn">
        <i class="fas fa-qrcode"></i> 生成二维码
      </button>
      <button class="btn btn-secondary" id="downloadQRBtn">
        <i class="fas fa-download"></i> 下载二维码
      </button>
    </div>

    <div class="qrcode-area">
      <div class="qrcode-canvas-wrapper">
        <canvas id="qrCanvas" width="240" height="240" style="width: 200px; height: 200px;"></canvas>
      </div>
      <div id="sumPreview" class="sum-preview">
        <i class="fas fa-chart-simple"></i> 当前总量: —— kg CO₂e
      </div>
    </div>
  </div>

  <script>
    (function(){
      console.log('❄️🌊 冰蓝碳迹 · 总量二维码 | 二维码格式: "总量:A kg CO₂e"');
      console.log('%c💧 清凉新奇 · 玻璃态 · 极光蓝', 'background: #0a4c7e; color: #b3e4ff; padding: 2px 8px; border-radius: 20px;');
    })();

    // DOM 元素
    const fieldsContainer = document.getElementById('fieldsContainer');
    const addFieldBtn = document.getElementById('addFieldBtn');
    const generateQRBtn = document.getElementById('generateQRBtn');
    const downloadQRBtn = document.getElementById('downloadQRBtn');
    const qrCanvas = document.getElementById('qrCanvas');
    const sumPreviewDiv = document.getElementById('sumPreview');

    // 辅助：计算所有有效数字值的总和
    function computeTotalSum() {
      const rows = document.querySelectorAll('.field-row');
      let total = 0;
      let validCount = 0;
      const errors = [];
      rows.forEach((row, idx) => {
        const valueInput = row.querySelector('.field-value-input');
        if (valueInput) {
          const rawValue = valueInput.value.trim();
          if (rawValue === "") return;
          const num = Number(rawValue);
          if (isNaN(num)) {
            errors.push(`第${idx+1}行值“${rawValue}”不是有效数字`);
          } else {
            total += num;
            validCount++;
          }
        }
      });
      return { total, validCount, errors };
    }

    function formatTotal(total) {
      if (Number.isInteger(total)) return total.toString();
      return parseFloat(total.toFixed(4)).toString();
    }

    function updateSumPreview() {
      const { total, validCount, errors } = computeTotalSum();
      if (validCount === 0) {
        sumPreviewDiv.innerHTML = `<i class="fas fa-chart-simple"></i> 当前总量: <span style="color:#b34e4e;">无有效数据</span><span style="font-size:0.75rem; margin-left:6px;">(请填写至少一个数字)</span>`;
        return null;
      } else {
        const formatted = formatTotal(total);
        sumPreviewDiv.innerHTML = `<i class="fas fa-chart-simple"></i> 当前总量: <strong style="font-size:1.2rem;">${formatted}</strong> kg CO₂e`;
        return total;
      }
    }

    function getValidatedTotal() {
      const { total, validCount, errors } = computeTotalSum();
      if (validCount === 0) {
        alert('⚠️ 至少需要一个有效的数字值！\n请填写数字（整数或小数），不能全为空或非数字。');
        return null;
      }
      if (errors.length > 0) {
        alert(`发现无效数字：\n${errors.join('\n')}\n\n有效数字部分已计算总和，请修正非数字项。`);
      }
      return total;
    }

    async function generateQRCodeWithTotal() {
      const total = getValidatedTotal();
      if (total === null) return false;
      const formattedTotal = formatTotal(total);
      const qrContent = `总量:${formattedTotal} kg CO₂e`;
      sumPreviewDiv.innerHTML = `<i class="fas fa-qrcode"></i> 二维码内容: <strong style="font-size:1rem;">${qrContent}</strong>`;
      try {
        await new Promise((resolve, reject) => {
          QRCode.toCanvas(qrCanvas, qrContent, { width: 240, margin: 2 }, (error) => {
            if (error) reject(error);
            else resolve();
          });
        });
        qrCanvas.dataset.validContent = qrContent;
        return true;
      } catch (err) {
        console.error(err);
        alert('二维码生成失败，请检查内容长度或刷新重试');
        return false;
      }
    }

    function downloadQR() {
      let hasValid = false;
      if (qrCanvas.dataset.validContent) {
        hasValid = true;
      } else {
        try {
          const ctx = qrCanvas.getContext('2d');
          const imgData = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
          const data = imgData.data;
          for (let i = 0; i < data.length; i += 10) {
            if (data[i] < 200 || data[i+1] < 200 || data[i+2] < 200) {
              hasValid = true;
              break;
            }
          }
        } catch(e) {}
      }
      if (!hasValid) {
        alert('还没有生成二维码，请先点击「生成二维码」按钮！');
        return;
      }
      try {
        const dataURL = qrCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        const timestamp = new Date().getTime();
        let suffix = qrCanvas.dataset.validContent ? qrCanvas.dataset.validContent.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_').slice(0, 30) : 'carbon';
        link.download = `qrcode_${suffix}_${timestamp}.png`;
        link.href = dataURL;
        link.click();
      } catch (err) {
        alert('下载失败，可尝试截图保存');
      }
    }

    // 动态表单管理
    function createFieldRow(keyVal = '', valueVal = '') {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'field-row';
      
      const keyInput = document.createElement('input');
      keyInput.type = 'text';
      keyInput.placeholder = '排放源';
      keyInput.className = 'field-key';
      keyInput.value = keyVal;
      
      const valueInput = document.createElement('input');
      valueInput.type = 'text';
      valueInput.placeholder = '碳排放量 (kg CO₂e)';
      valueInput.className = 'field-value-input';
      valueInput.value = valueVal;
      
      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'btn-delete';
      delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
      delBtn.setAttribute('aria-label', '删除字段');
      
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        rowDiv.remove();
        updateSumPreview();
        qrCanvas.dataset.validContent = '';
        const ctx = qrCanvas.getContext('2d');
        ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
        const hasValid = updateSumPreview();
        if (!hasValid && hasValid !== null) {
          sumPreviewDiv.innerHTML = `<i class="fas fa-chart-simple"></i> 当前总量: —— kg CO₂e`;
        }
      });
      
      const onInputChange = () => {
        const total = updateSumPreview();
        qrCanvas.dataset.validContent = '';
        const ctx = qrCanvas.getContext('2d');
        ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
        if (total === undefined || total === null) {
          const { validCount } = computeTotalSum();
          if (validCount === 0) {
            sumPreviewDiv.innerHTML = `<i class="fas fa-chart-simple"></i> 当前总量: <span style="color:#b34e4e;">无有效数据</span>`;
          }
        }
      };
      
      keyInput.addEventListener('input', onInputChange);
      valueInput.addEventListener('input', onInputChange);
      
      rowDiv.appendChild(keyInput);
      rowDiv.appendChild(valueInput);
      rowDiv.appendChild(delBtn);
      
      return rowDiv;
    }
    
    function initDefaultRows() {
      fieldsContainer.innerHTML = '';
      const firstRow = createFieldRow('', '');
      fieldsContainer.appendChild(firstRow);
      updateSumPreview();
      const ctx = qrCanvas.getContext('2d');
      ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
      qrCanvas.dataset.validContent = '';
    }
    
    function addNewRow() {
      const newRow = createFieldRow('', '');
      fieldsContainer.appendChild(newRow);
      updateSumPreview();
      qrCanvas.dataset.validContent = '';
      const ctx = qrCanvas.getContext('2d');
      ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
    }
    
    addFieldBtn.addEventListener('click', addNewRow);
    generateQRBtn.addEventListener('click', async () => {
      await generateQRCodeWithTotal();
    });
    downloadQRBtn.addEventListener('click', downloadQR);
    
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        generateQRCodeWithTotal();
      }
    });
    
    initDefaultRows();
  </script>
</body>
</html>
