<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>蔬果溯源信息二维码</title>
  <!-- Google Fonts & Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- QRCode.js -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(145deg, #d4eaff 0%, #b3d9ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      color: #0b2b4a;
    }

    body::before {
      content: '';
      position: fixed;
      top: -15%;
      left: -5%;
      width: 85%;
      height: 85%;
      background: radial-gradient(circle at 20% 30%, rgba(0, 180, 255, 0.25) 0%, rgba(100, 210, 255, 0.05) 60%, transparent 80%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(35px);
      animation: floatGlow 14s infinite alternate ease-in-out;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -5%;
      width: 75%;
      height: 75%;
      background: radial-gradient(circle at 80% 80%, rgba(70, 150, 255, 0.25) 0%, rgba(0, 200, 255, 0.08) 50%, transparent 80%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(40px);
      animation: floatGlow 16s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      100% { transform: translate(-3%, 2%) scale(1.05); opacity: 0.85; }
    }

    .dict-card {
      position: relative;
      z-index: 10;
      max-width: 850px;
      width: 100%;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-radius: 3rem;
      box-shadow: 0 30px 50px -20px rgba(0, 70, 150, 0.3),
                  0 4px 12px rgba(0, 20, 60, 0.08),
                  inset 0 1px 2px rgba(255, 255, 255, 0.6);
      padding: 2rem 2rem 2.2rem;
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1), box-shadow 0.4s ease;
      border: 1px solid rgba(140, 210, 255, 0.4);
    }

    .dict-card:hover {
      box-shadow: 0 40px 60px -22px #0077be60, 0 8px 20px -6px #1e3a8a30, inset 0 0 0 1px rgba(255,255,255,0.5);
      transform: translateY(-6px);
    }

    .back-home {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 20;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 2.5rem;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #075a8b;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(70, 170, 255, 0.4);
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,70,140,0.1);
      letter-spacing: 0.2px;
    }

    .back-home i {
      font-size: 0.8rem;
      color: #0a5f9e;
    }

    .back-home:hover {
      background: white;
      border-color: #3b9eff;
      transform: translateX(-3px);
      box-shadow: 0 6px 14px rgba(0,110,200,0.15);
      color: #02457a;
    }

    .icon-wrapper {
      background: linear-gradient(145deg, #0a4c7e, #1e6ab3);
      width: 86px;
      height: 86px;
      margin: 0 auto 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2.2rem;
      box-shadow: 0 18px 24px -12px #0a3a60, 0 2px 6px rgba(0,0,0,0.05), inset 0 2px 4px rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .icon-wrapper i {
      font-size: 3.5rem;
      color: #e1f3ff;
      filter: drop-shadow(0 4px 6px #002b4e40);
      text-shadow: 0 2px 8px rgba(0,120,255,0.6);
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #035c8f, #1e88e5, #26c6da);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.4px;
      margin-bottom: 0.4rem;
      text-shadow: 0 2px 10px rgba(0,160,255,0.2);
    }

    .sub {
      color: #1a4e7a;
      font-weight: 500;
      font-size: 0.95rem;
      background: rgba(70, 160, 255, 0.12);
      display: inline-block;
      padding: 0.35rem 1.4rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      margin-bottom: 1.8rem;
      border: 0.5px solid rgba(100, 190, 255, 0.3);
      box-shadow: inset 0 1px 4px white;
    }

    .sub i {
      color: #0284c7;
      margin-right: 4px;
    }

    .form-section {
      margin: 1.2rem 0 0.8rem;
    }

    .fields-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .fields-header label {
      font-weight: 600;
      color: #075a8b;
      background: rgba(0, 140, 255, 0.1);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      border: 0.5px solid rgba(70, 160, 255, 0.25);
    }

    .btn-add {
      background: rgba(30, 130, 230, 0.12);
      border: 1px solid rgba(30, 130, 230, 0.4);
      color: #065282;
      padding: 0.5rem 1.2rem;
      border-radius: 2.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 6px rgba(0,80,140,0.05);
    }

    .btn-add i {
      font-size: 0.9rem;
    }

    .btn-add:hover {
      background: #1a73c4;
      color: white;
      border-color: #1a73c4;
      transform: scale(0.97);
      box-shadow: 0 8px 14px -8px #0a4c7e;
    }

    .fields-container {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 0.2rem;
      margin-bottom: 1.2rem;
    }

    .field-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 0.75rem 1.1rem;
      border-radius: 1.8rem;
      border: 1px solid rgba(80, 170, 255, 0.3);
      transition: all 0.2s;
      box-shadow: inset 0 1px 3px rgba(255,255,255,0.5);
    }

    .field-row:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #3b9eff;
    }

    .field-type {
      flex: 1.2;
      min-width: 140px;
    }

    .field-value {
      flex: 2;
      min-width: 160px;
    }

    .field-row select,
    .field-row input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(20, 120, 200, 0.3);
      background: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s;
      outline: none;
      color: #0a2e4a;
    }

    .field-row select {
      cursor: pointer;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"><path fill="%231e88e5" d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1rem;
    }

    .field-row input:focus,
    .field-row select:focus {
      border-color: #1e88e5;
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.2);
    }

    .btn-delete {
      background: rgba(180, 50, 80, 0.1);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 40px;
      color: #b13e5c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 1.1rem;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
    }

    .btn-delete:hover {
      background: #d65b7a;
      color: white;
      transform: scale(0.92);
    }

    .action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
      margin: 1.8rem 0 1rem;
    }

    .btn {
      flex: 1;
      min-width: 150px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0.95rem 1.8rem;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #075a8b;
      box-shadow: 0 6px 14px rgba(0, 60, 120, 0.08), inset 0 1px 0 #ffffffcc;
      letter-spacing: 0.2px;
      text-decoration: none;
      border: 1px solid rgba(70, 170, 255, 0.3);
    }

    .btn-primary {
      background: linear-gradient(115deg, #0a5f9e, #1a73c4);
      color: white;
      box-shadow: 0 14px 22px -10px #0a4c7e, 0 1px 0 inset #7ac4ff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(115deg, #0e6bb3, #1f85d5);
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 22px 28px -16px #005a9c, 0 0 0 2px rgba(0, 180, 255, 0.2);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(40, 140, 255, 0.45);
      color: #065282;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.95);
      border-color: #3b9eff;
      transform: scale(1.02) translateY(-2px);
      box-shadow: 0 18px 24px -14px #1a6ab0, 0 0 0 3px rgba(0, 150, 255, 0.1);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .qrcode-area {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1.5px dashed rgba(0, 130, 200, 0.3);
    }

    .qrcode-canvas-wrapper {
      display: flex;
      justify-content: center;
      margin: 1.2rem 0 1rem;
    }

    canvas {
      background: white;
      padding: 12px;
      border-radius: 28px;
      box-shadow: 0 16px 28px -12px rgba(0, 80, 150, 0.3), inset 0 0 0 1px rgba(255,255,255,0.8);
      max-width: 100%;
      height: auto;
      width: 200px;
      height: 200px;
    }

    .fields-container::-webkit-scrollbar {
      width: 5px;
    }

    .fields-container::-webkit-scrollbar-track {
      background: rgba(0, 120, 210, 0.08);
      border-radius: 10px;
    }

    .fields-container::-webkit-scrollbar-thumb {
      background: #1e88e5;
      border-radius: 10px;
    }

    .snowflake-deco {
      position: absolute;
      color: rgba(255, 255, 255, 0.2);
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    /* 选项单位提示小标签（可选） */
    .input-hint {
      font-size: 0.7rem;
      color: #1a6ab0;
      margin-top: 2px;
      padding-left: 0.5rem;
      opacity: 0.8;
    }

    @media (max-width: 560px) {
      .dict-card {
        padding: 1.8rem 1.2rem 2rem;
        border-radius: 2.2rem;
      }
      .field-row {
        flex-direction: column;
        align-items: stretch;
      }
      .btn-delete {
        align-self: flex-end;
        width: 36px;
        height: 36px;
      }
      .action-group .btn {
        min-width: 130px;
        padding: 0.8rem 1.2rem;
      }
      .icon-wrapper {
        width: 70px;
        height: 70px;
      }
      .icon-wrapper i {
        font-size: 2.8rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      .back-home {
        top: 0.6rem;
        left: 0.6rem;
        padding: 0.3rem 0.8rem;
      }
    }

    @media (max-width: 400px) {
      .btn {
        min-width: 120px;
      }
    }

    .btn:focus-visible {
      outline: 3px solid #3b9eff;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="snowflake-deco" style="top: 10%; left: 6%; font-size: 2rem; opacity: 0.25;">❄️</div>
  <div class="snowflake-deco" style="bottom: 12%; right: 8%; font-size: 2.4rem; opacity: 0.2;">❄️</div>

  <div class="dict-card">
    <a href="https://yuzhe-yang80.github.io/333/" class="back-home" target="_self">
      <i class="fas fa-arrow-left"></i> 返回
    </a>

    <div class="icon-wrapper">
      <i class="fas fa-apple-alt"></i>
    </div>
    <h1>制作二维码</h1>
    <div class="sub">
      <i class="fas fa-seedling"></i> 选择类型 · 填写数值
    </div>

    <div class="form-section">
      <div class="fields-header">
        <label><i class="fas fa-tasks"></i> 信息条目（下拉选择，填入对应值）</label>
        <button type="button" class="btn-add" id="addFieldBtn">
          <i class="fas fa-plus-circle"></i> 添加字段
        </button>
      </div>
      <div class="fields-container" id="fieldsContainer"></div>
    </div>

    <div class="action-group">
      <button class="btn btn-primary" id="generateQRBtn">
        <i class="fas fa-qrcode"></i> 生成二维码
      </button>
      <button class="btn btn-secondary" id="downloadQRBtn">
        <i class="fas fa-download"></i> 下载二维码
      </button>
    </div>

    <div class="qrcode-area">
      <div class="qrcode-canvas-wrapper">
        <canvas id="qrCanvas" width="240" height="240" style="width: 200px; height: 200px;"></canvas>
      </div>
    </div>
  </div>

  <script>
    (function(){
      console.log('🍏 冰蓝果园 · 信息二维码 (下拉选项版)');
    })();

    // ---------- 配置数据：下拉选项及其单位/输入提示 ----------
    const FIELD_TYPES = [
      { value: 'growth_story', label: '成长历程', unit: '', placeholder: '描述 (如: 春季萌芽)' },
      { value: 'orchard_story', label: '果园故事', unit: '', placeholder: '故事简介' },
      { value: 'best_period', label: '最佳食用期', unit: '', placeholder: '例如: 9月-10月' },
      { value: 'growth_duration', label: '生长时长', unit: '天', placeholder: '天数' },
      { value: 'sweetness', label: '甜度实测', unit: 'Brix', placeholder: '数值' },
      { value: 'light_intensity', label: '光照强度', unit: 'lux', placeholder: '数值' },
      { value: 'pesticide_record', label: '农药记录', unit: '', placeholder: '记录内容' }
    ];

    // 根据类型value获取单位
    function getUnitByType(typeValue) {
      const found = FIELD_TYPES.find(t => t.value === typeValue);
      return found ? found.unit : '';
    }

    // 获取占位符
    function getPlaceholderByType(typeValue) {
      const found = FIELD_TYPES.find(t => t.value === typeValue);
      return found ? found.placeholder : '请输入值';
    }

    const fieldsContainer = document.getElementById('fieldsContainer');
    const addFieldBtn = document.getElementById('addFieldBtn');
    const generateQRBtn = document.getElementById('generateQRBtn');
    const downloadQRBtn = document.getElementById('downloadQRBtn');
    const qrCanvas = document.getElementById('qrCanvas');

    // 获取所有有效条目（非空值）
    function getValidEntries() {
      const rows = document.querySelectorAll('.field-row');
      const entries = [];
      rows.forEach((row) => {
        const typeSelect = row.querySelector('.field-type-select');
        const valueInput = row.querySelector('.field-value-input');
        if (!typeSelect || !valueInput) return;
        const typeValue = typeSelect.value;
        const rawValue = valueInput.value.trim();
        if (rawValue === '') return; // 空值忽略
        
        const typeLabel = typeSelect.options[typeSelect.selectedIndex]?.text || typeValue;
        const unit = getUnitByType(typeValue);
        
        // 对于甜度、光照强度等数字类型，尝试格式化（但保留原始输入，只做展示用）
        let displayValue = rawValue;
        if ((typeValue === 'sweetness' || typeValue === 'light_intensity' || typeValue === 'growth_duration') && !isNaN(parseFloat(rawValue))) {
          // 如果是数字，保留合理精度（不做强制转换，保留用户输入格式，但去除多余空格）
          const num = parseFloat(rawValue);
          if (!isNaN(num)) {
            displayValue = Number.isInteger(num) ? num.toString() : parseFloat(num.toFixed(4)).toString();
          }
        }
        
        entries.push({
          type: typeValue,
          label: typeLabel,
          value: displayValue,
          unit: unit,
          rawValue: rawValue
        });
      });
      return entries;
    }

    // 构建二维码内容字符串 (格式: 成长历程: 描述; 甜度实测: 15 Brix)
    function buildQRContent(entries) {
      if (entries.length === 0) return '';
      return entries.map(e => {
        const unitPart = e.unit ? ` ${e.unit}` : '';
        return `${e.label}: ${e.value}${unitPart}`;
      }).join('; ');
    }

    async function generateQRCode() {
      const entries = getValidEntries();
      if (entries.length === 0) {
        alert('⚠️ 请至少填写一个有效条目！');
        return false;
      }
      const content = buildQRContent(entries);
      try {
        await new Promise((resolve, reject) => {
          QRCode.toCanvas(qrCanvas, content, { width: 240, margin: 2 }, (error) => {
            if (error) reject(error);
            else resolve();
          });
        });
        qrCanvas.dataset.validContent = content;
        return true;
      } catch (err) {
        console.error(err);
        alert('二维码生成失败，内容可能过长，请精简条目。');
        return false;
      }
    }

    function downloadQR() {
      let hasValid = false;
      if (qrCanvas.dataset.validContent) {
        hasValid = true;
      } else {
        try {
          const ctx = qrCanvas.getContext('2d');
          const imgData = ctx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
          const data = imgData.data;
          for (let i = 0; i < data.length; i += 10) {
            if (data[i] < 200 || data[i+1] < 200 || data[i+2] < 200) {
              hasValid = true;
              break;
            }
          }
        } catch(e) {}
      }
      if (!hasValid) {
        alert('还没有生成二维码，请先点击「生成二维码」！');
        return;
      }
      try {
        const dataURL = qrCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        const timestamp = new Date().getTime();
        link.download = `orchard_info_${timestamp}.png`;
        link.href = dataURL;
        link.click();
      } catch (err) {
        alert('下载失败，可尝试截图保存');
      }
    }

    // 创建一行 (带下拉框)
    function createFieldRow(selectedType = 'growth_story', valueVal = '') {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'field-row';
      
      // 下拉框
      const selectEl = document.createElement('select');
      selectEl.className = 'field-type-select';
      FIELD_TYPES.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt.value;
        option.textContent = opt.label;
        if (opt.value === selectedType) option.selected = true;
        selectEl.appendChild(option);
      });
      
      // 输入框
      const valueInput = document.createElement('input');
      valueInput.type = 'text';
      valueInput.className = 'field-value-input';
      valueInput.placeholder = getPlaceholderByType(selectedType);
      valueInput.value = valueVal;
      
      // 根据选择更新占位符
      selectEl.addEventListener('change', () => {
        valueInput.placeholder = getPlaceholderByType(selectEl.value);
        // 清空二维码（内容改变）
        qrCanvas.dataset.validContent = '';
        const ctx = qrCanvas.getContext('2d');
        ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
      });
      
      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'btn-delete';
      delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
      delBtn.setAttribute('aria-label', '删除字段');
      
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        rowDiv.remove();
        qrCanvas.dataset.validContent = '';
        const ctx = qrCanvas.getContext('2d');
        ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
      });
      
      const onInputChange = () => {
        qrCanvas.dataset.validContent = '';
        const ctx = qrCanvas.getContext('2d');
        ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
      };
      
      valueInput.addEventListener('input', onInputChange);
      // 下拉变化也会触发清空（已添加）
      
      rowDiv.appendChild(selectEl);
      rowDiv.appendChild(valueInput);
      rowDiv.appendChild(delBtn);
      
      return rowDiv;
    }
    
    function initDefaultRows() {
      fieldsContainer.innerHTML = '';
      // 默认添加一行，类型为“成长历程”
      fieldsContainer.appendChild(createFieldRow('growth_story', ''));
      const ctx = qrCanvas.getContext('2d');
      ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
      qrCanvas.dataset.validContent = '';
    }
    
    function addNewRow() {
      fieldsContainer.appendChild(createFieldRow('growth_story', ''));
      qrCanvas.dataset.validContent = '';
      const ctx = qrCanvas.getContext('2d');
      ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
    }
    
    addFieldBtn.addEventListener('click', addNewRow);
    generateQRBtn.addEventListener('click', generateQRCode);
    downloadQRBtn.addEventListener('click', downloadQR);
    
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        generateQRCode();
      }
    });
    
    initDefaultRows();
  </script>
</body>
</html>
